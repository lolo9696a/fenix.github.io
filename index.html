<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fenix — Professional Live Dealer Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400;1,600&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#c9a84c;--gold-l:#e8c97a;--gold-d:#7a6030;
  --crimson:#a8192e;--crimson-l:#d42040;
  --bg:#04040a;--bg2:#08080f;--bg3:#0d0d18;--bg4:rgba(13,13,24,0.8);
  --white:#f0ebe0;--dim:#6a6458;--dim2:#9a8e80;
  --bor:rgba(201,168,76,0.18);--bor2:rgba(255,255,255,0.06);
  --r:8px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{overflow-x:hidden;scroll-behavior:smooth;}
body{background:var(--bg);color:var(--white);font-family:'DM Sans',sans-serif;overflow-x:hidden;}

/* PAGE SYSTEM */
.page{display:none;width:100%;}
.page.active{display:block;}

/* CURSOR — purely decorative, never blocks interaction */
.cur{position:fixed;width:10px;height:10px;background:var(--gold);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:width .2s,height .2s;opacity:0;mix-blend-mode:difference;}
.cur-ring{position:fixed;width:36px;height:36px;border:1px solid rgba(201,168,76,0.5);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:width .3s,height .3s,border-color .3s;opacity:0;}
@media(hover:hover) and (pointer:fine){.cur,.cur-ring{opacity:1;}}

/* SCROLLBAR */
::-webkit-scrollbar{width:2px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--gold-d);}

/* HAMBURGER */
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;z-index:1100;background:none;border:none;padding:4px;}
.hamburger span{display:block;width:24px;height:1.5px;background:var(--gold);transition:all .3s;}
.hamburger.open span:nth-child(1){transform:translateY(6.5px) rotate(45deg);}
.hamburger.open span:nth-child(2){opacity:0;}
.hamburger.open span:nth-child(3){transform:translateY(-6.5px) rotate(-45deg);}

/* MOBILE MENU */
.mobile-menu{
  position:fixed;inset:0;background:rgba(4,4,10,0.98);
  backdrop-filter:blur(20px);z-index:1050;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:32px;
  opacity:0;pointer-events:none;transition:opacity .4s;
}
.mobile-menu.open{opacity:1;pointer-events:all;}
.mobile-menu a{font-family:'Playfair Display',serif;font-size:32px;color:var(--dim2);text-decoration:none;transition:color .3s;letter-spacing:2px;}
.mobile-menu a:hover{color:var(--gold);}

/* NAV */
nav{
  position:fixed;top:0;left:0;right:0;z-index:1000;
  padding:20px 64px;
  display:flex;align-items:center;justify-content:space-between;
  transition:all .4s;
}
nav.scrolled{background:rgba(4,4,10,0.96);border-bottom:1px solid var(--bor);padding:14px 64px;}
.nav-logo{
  font-family:'Space Mono',monospace;font-size:20px;letter-spacing:8px;
  color:var(--gold);text-decoration:none;display:flex;flex-direction:column;
}
.nav-logo-sub{font-size:7px;letter-spacing:5px;color:var(--dim);margin-top:2px;font-family:'DM Sans',sans-serif;}
.nav-links{display:flex;gap:36px;list-style:none;}
.nav-links a{
  color:var(--dim2);text-decoration:none;font-size:12px;
  letter-spacing:3px;text-transform:uppercase;transition:color .3s;cursor:pointer;
  position:relative;
}
.nav-links a::after{content:'';position:absolute;bottom:-4px;left:0;right:0;height:1px;background:var(--gold);transform:scaleX(0);transition:transform .3s;transform-origin:right;}
.nav-links a:hover{color:var(--gold);}
.nav-links a:hover::after{transform:scaleX(1);transform-origin:left;}
.nav-cta{
  background:transparent;border:1px solid var(--gold);
  color:var(--gold);padding:10px 28px;
  font-family:'DM Sans',sans-serif;font-size:11px;letter-spacing:3px;text-transform:uppercase;
  cursor:pointer;transition:all .3s;text-decoration:none;
}
.nav-cta:hover{background:var(--gold);color:var(--bg);}

/* ── HOME ── */
#home{display:block;}

/* HERO */
.hero{position:relative;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.hero-bg{position:absolute;inset:0;}

/* AI Scene SVG background */
.hero-scene{position:absolute;inset:0;overflow:hidden;}

/* Ambient orbs */
.orb{position:absolute;border-radius:50%;pointer-events:none;}
.orb-a{width:700px;height:700px;top:-200px;right:-200px;
  background:radial-gradient(circle at 40% 40%,rgba(168,25,46,0.12),transparent 65%);
  animation:orb-float 22s ease-in-out infinite;}
.orb-b{width:500px;height:500px;bottom:-100px;left:-100px;
  background:radial-gradient(circle at 50% 50%,rgba(201,168,76,0.08),transparent 65%);
  animation:orb-float 18s ease-in-out infinite reverse;animation-delay:-8s;}
.orb-c{width:300px;height:300px;top:35%;left:25%;
  background:radial-gradient(circle,rgba(201,168,76,0.04),transparent 70%);
  animation:orb-float 14s ease-in-out infinite;animation-delay:-4s;}
@keyframes orb-float{0%,100%{transform:translate(0,0);}33%{transform:translate(30px,-40px);}66%{transform:translate(-20px,20px);}

/* 3D grid floor */
.hero-grid{
  position:absolute;bottom:0;left:0;right:0;height:55%;
  background-image:linear-gradient(rgba(201,168,76,0.06) 1px,transparent 1px),linear-gradient(90deg,rgba(201,168,76,0.06) 1px,transparent 1px);
  background-size:70px 70px;
  transform:perspective(700px) rotateX(65deg);transform-origin:bottom center;
}
.hero-grid::after{content:'';position:absolute;bottom:0;left:0;right:0;height:50%;background:linear-gradient(to top,var(--bg),transparent);}

/* Particles */
.particles{position:absolute;inset:0;pointer-events:none;}
.particle{position:absolute;width:1.5px;height:1.5px;background:var(--gold);border-radius:50%;animation:p-rise linear infinite;opacity:0;}
@keyframes p-rise{0%{opacity:0;transform:translateY(0);}10%{opacity:.7;}90%{opacity:.1;}100%{opacity:0;transform:translateY(-100vh);}

/* AI image in hero */
.hero-ai-image{
  position:absolute;right:8%;top:50%;transform:translateY(-50%);
  width:360px;height:460px;
  border:1px solid var(--bor);
  overflow:hidden;
  background:var(--bg3);
}
.hero-ai-image::before{
  content:'';position:absolute;inset:0;z-index:2;
  background:linear-gradient(to right,var(--bg) 0%,transparent 30%),
             linear-gradient(to top,var(--bg) 0%,transparent 30%);
}
.ai-img-inner{
  width:100%;height:100%;
  background:
    radial-gradient(ellipse 70% 50% at 60% 40%,rgba(201,168,76,0.15),transparent 70%),
    radial-gradient(ellipse 50% 60% at 30% 70%,rgba(168,25,46,0.1),transparent 70%),
    linear-gradient(160deg,#0a0a15,#12101a,#0d0a12);
  display:flex;align-items:center;justify-content:center;
}
/* SVG-based AI dealer illustration */
.ai-dealer-svg{width:260px;height:340px;opacity:.85;}
.ai-img-label{
  position:absolute;bottom:16px;left:16px;z-index:3;
  font-family:'Space Mono',monospace;font-size:9px;letter-spacing:3px;color:var(--gold);text-transform:uppercase;
}
.ai-img-label span{display:block;font-family:'DM Sans',sans-serif;font-size:11px;letter-spacing:1px;color:var(--dim2);margin-top:4px;}

/* Second hero image - left side background strip */
.hero-left-strip{
  position:absolute;left:0;top:0;bottom:0;width:320px;
  background:linear-gradient(180deg,transparent,rgba(201,168,76,0.02) 50%,transparent);
  pointer-events:none;
}

.hero-content{
  position:relative;z-index:2;text-align:left;
  padding:0 64px;max-width:700px;
  margin-left:0;
}
.hero-tag{
  display:inline-flex;align-items:center;gap:10px;
  border:1px solid var(--bor);padding:8px 20px;margin-bottom:44px;
  font-size:10px;letter-spacing:5px;color:var(--gold);text-transform:uppercase;
  animation:fade-up 1s ease forwards;opacity:0;
}
.blink-dot{width:6px;height:6px;background:var(--crimson-l);border-radius:50%;animation:blink 1.4s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.15;}}
@keyframes fade-up{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}

.hero-title{
  font-family:'Playfair Display',serif;
  font-size:clamp(52px,7vw,100px);font-weight:700;line-height:.9;
  letter-spacing:-2px;
  animation:fade-up 1.2s ease forwards;opacity:0;animation-delay:.3s;
}
.hero-title .gold{color:var(--gold);}
.hero-title .outline{-webkit-text-stroke:1px rgba(201,168,76,0.35);color:transparent;}
.hero-sub{
  font-size:14px;letter-spacing:2px;color:var(--dim2);
  margin:28px 0 44px;line-height:2;max-width:500px;
  animation:fade-up 1.2s ease forwards;opacity:0;animation-delay:.6s;
}
.hero-actions{
  display:flex;gap:16px;flex-wrap:wrap;
  animation:fade-up 1.2s ease forwards;opacity:0;animation-delay:.9s;
}
.btn-primary{
  background:var(--gold);color:var(--bg);
  padding:15px 44px;border:none;
  font-family:'DM Sans',sans-serif;font-size:11px;letter-spacing:3px;text-transform:uppercase;
  cursor:pointer;transition:all .3s;text-decoration:none;display:inline-block;position:relative;overflow:hidden;font-weight:600;
}
.btn-primary::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.2),transparent);transform:translateX(-100%);transition:transform .4s;}
.btn-primary:hover::after{transform:translateX(100%);}
.btn-primary:hover{background:var(--gold-l);transform:translateY(-2px);box-shadow:0 16px 40px rgba(201,168,76,.2);}
.btn-outline{
  background:transparent;border:1px solid var(--bor);color:var(--white);
  padding:15px 44px;font-family:'DM Sans',sans-serif;font-size:11px;letter-spacing:3px;text-transform:uppercase;
  cursor:pointer;transition:all .3s;text-decoration:none;display:inline-block;
}
.btn-outline:hover{border-color:var(--gold);color:var(--gold);transform:translateY(-2px);}

.scroll-hint{
  position:absolute;bottom:36px;left:64px;
  display:flex;align-items:center;gap:14px;
  color:var(--dim);font-size:10px;letter-spacing:3px;text-transform:uppercase;
  animation:fade-up 2s ease forwards;opacity:0;animation-delay:1.4s;
}
.scroll-line{width:50px;height:1px;background:linear-gradient(to right,var(--gold),transparent);animation:scroll-pulse 2s ease-in-out infinite;}
@keyframes scroll-pulse{0%,100%{transform:scaleX(1);}50%{transform:scaleX(1.3);}}

/* STATS */
.stats-strip{
  background:var(--bg3);border-top:1px solid var(--bor);border-bottom:1px solid var(--bor);
  padding:44px 64px;display:grid;grid-template-columns:repeat(4,1fr);
}
.stat-item{text-align:center;padding:0 20px;border-right:1px solid var(--bor2);}
.stat-item:last-child{border-right:none;}
.stat-num{font-family:'Playfair Display',serif;font-size:52px;font-weight:400;color:var(--gold);line-height:1;}
.stat-label{font-size:10px;letter-spacing:3px;color:var(--dim);text-transform:uppercase;margin-top:8px;}

/* SECTION COMMON */
.section{padding:120px 64px;}
.section-label{
  font-size:10px;letter-spacing:6px;color:var(--gold);text-transform:uppercase;margin-bottom:18px;
  display:flex;align-items:center;gap:16px;
}
.section-label::before{content:'';width:32px;height:1px;background:var(--gold);}
.section-title{font-family:'Playfair Display',serif;font-size:clamp(34px,4.5vw,66px);font-weight:700;line-height:1.05;}
.section-title .italic{font-style:italic;color:var(--gold);}

/* MARQUEE */
.marquee-wrap{overflow:hidden;padding:28px 0;border-top:1px solid var(--bor2);border-bottom:1px solid var(--bor2);background:rgba(201,168,76,.015);}
.marquee-track{display:flex;gap:80px;animation:marquee 30s linear infinite;white-space:nowrap;width:max-content;}
.marquee-item{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:4px;color:var(--dim);text-transform:uppercase;display:flex;align-items:center;gap:28px;}
.marquee-item::after{content:'◆';color:var(--gold);font-size:7px;}
@keyframes marquee{from{transform:translateX(0);}to{transform:translateX(-50%);}}

/* ABOUT INTRO HOME */
.home-about{display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:center;padding:120px 64px;}
.about-visual{position:relative;height:480px;}
.about-img-main{
  position:absolute;inset:0;
  background:
    radial-gradient(ellipse 60% 70% at 50% 50%,rgba(168,25,46,0.08),transparent 70%),
    linear-gradient(160deg,#0c0c18,#10101e);
  border:1px solid var(--bor);
  display:flex;align-items:center;justify-content:center;overflow:hidden;
}
.ring-anim{
  width:260px;height:260px;border-radius:50%;
  border:1px solid rgba(201,168,76,.25);
  display:flex;align-items:center;justify-content:center;
  animation:spin 30s linear infinite;
  position:relative;
}
.ring-anim::before{content:'';position:absolute;width:6px;height:6px;background:var(--gold);border-radius:50%;top:-3px;left:50%;transform:translateX(-50%);} 
.ring-inner{
  width:185px;height:185px;border-radius:50%;
  border:1px dashed rgba(201,168,76,.15);
  display:flex;align-items:center;justify-content:center;
  animation:spin 20s linear infinite reverse;
}
.ring-core{text-align:center;}
.ring-core-text{font-family:'Space Mono',monospace;font-size:13px;color:var(--gold);letter-spacing:4px;}
.ring-core-sub{font-size:10px;color:var(--dim);letter-spacing:2px;margin-top:6px;}
@keyframes spin{from{transform:rotate(0);}to{transform:rotate(360deg);}}

.float-card{
  position:absolute;background:rgba(4,4,10,.92);backdrop-filter:blur(12px);
  border:1px solid var(--bor);padding:18px 22px;
}
.float-card-1{top:-20px;right:-20px;}
.float-card-2{bottom:-20px;left:-20px;}
.float-num{font-family:'Playfair Display',serif;font-size:34px;color:var(--gold);font-weight:400;}
.float-lbl{font-size:10px;color:var(--dim);letter-spacing:2px;margin-top:4px;}

.divider{width:52px;height:1px;background:var(--gold);margin:28px 0;}

/* FEATURES GRID */
.features-section{background:var(--bg2);padding:120px 64px;}
.features-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;margin-top:56px;}
.feat-card{
  background:var(--bg3);padding:48px 36px;
  position:relative;overflow:hidden;transition:background .3s,transform .3s;
}
.feat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(to right,transparent,var(--gold),transparent);transform:scaleX(0);transition:transform .4s;}
.feat-card:hover::before{transform:scaleX(1);} 
.feat-card:hover{background:#101018;transform:translateY(-3px);} 
.feat-icon{width:54px;height:54px;border:1px solid var(--bor);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:28px;transition:border-color .3s,background .3s;}
.feat-card:hover .feat-icon{border-color:var(--gold);background:rgba(201,168,76,.06);} 
.feat-num{font-family:'Space Mono',monospace;font-size:10px;color:var(--gold-d);position:absolute;top:24px;right:24px;}
.feat-title{font-family:'Playfair Display',serif;font-size:20px;margin-bottom:14px;}
.feat-desc{font-size:13px;color:var(--dim2);line-height:1.85;}

/* MISSION */
.mission{padding:100px 64px;background:var(--bg3);position:relative;overflow:hidden;text-align:center;}
.mission::before{content:'"';position:absolute;top:-60px;left:40px;font-family:'Playfair Display',serif;font-size:360px;color:rgba(201,168,76,.025);line-height:1;pointer-events:none;}
.mission-text{font-family:'Playfair Display',serif;font-size:clamp(22px,2.8vw,40px);font-weight:400;font-style:italic;line-height:1.6;max-width:760px;margin:0 auto;}
.mission-text .gold{color:var(--gold);}
.mission-attr{font-size:11px;letter-spacing:4px;color:var(--dim);text-transform:uppercase;margin-top:36px;}

/* CTA */
.cta-section{padding:120px 64px;text-align:center;border-top:1px solid var(--bor2);background:linear-gradient(135deg,rgba(168,25,46,.04),rgba(201,168,76,.02));}
.cta-title{font-family:'Playfair Display',serif;font-size:clamp(38px,5vw,72px);font-weight:700;margin-bottom:16px;}
.cta-sub{font-size:14px;color:var(--dim2);letter-spacing:2px;margin-bottom:48px;}

/* ── FAQ PAGE ── */
.faq-hero{padding:160px 64px 80px;background:radial-gradient(ellipse 60% 40% at 50% 0%,rgba(201,168,76,.04),transparent);} 
.faq-body{padding:0 64px 100px;} 
.faq-list{max-width:800px;margin:60px auto 0;} 
.faq-item{border-bottom:1px solid var(--bor2);overflow:hidden;} 
.faq-q{display:flex;align-items:center;justify-content:space-between;padding:28px 0;font-family:'Playfair Display',serif;font-size:20px;font-weight:400;transition:color .3s;} 
.faq-q:hover{color:var(--gold);} 
.faq-icon{width:32px;height:32px;border:1px solid var(--bor);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px;color:var(--gold);transition:transform .3s,background .3s;} 
.faq-item.open .faq-icon{transform:rotate(45deg);background:rgba(201,168,76,.08);} 
.faq-a{max-height:0;overflow:hidden;transition:max-height .4s ease,padding .4s ease;font-size:14px;color:var(--dim2);line-height:1.9;} 
.faq-item.open .faq-a{max-height:300px;padding-bottom:24px;} 

/* ... rest of CSS unchanged (omitted for brevity in query) ... */
</style>
</head>
<body>

<div class="cur" id="cur"></div>
<div class="cur-ring" id="curRing"></div>

<!-- MOBILE MENU -->
<div class="mobile-menu" id="mobileMenu">
  <a href="#" onclick="showPage('home');closeMobile()">Home</a>
  <a href="#" onclick="showPage('about');closeMobile()">About</a>
  <a href="#" onclick="showPage('services');closeMobile()">Services</a>
  <a href="#" onclick="showPage('gallery');closeMobile()">Gallery</a>
  <a href="#" onclick="showPage('faq');closeMobile()">FAQ</a>
  <a href="#" onclick="showPage('contact');closeMobile()">Contact</a>
</div>

<!-- NAV -->
<nav id="mainNav">
  <a href="#" class="nav-logo" onclick="showPage('home')">
    FENIX
    <span class="nav-logo-sub">Live Dealer Studio</span>
  </a>
  <ul class="nav-links">
    <li><a href="#" onclick="showPage('home')">Home</a></li>
    <li><a href="#" onclick="showPage('about')">About</a></li>
    <li><a href="#" onclick="showPage('services')">Services</a></li>
    <li><a href="#" onclick="showPage('gallery')">Gallery</a></li>
    <li><a href="#" onclick="showPage('faq')">FAQ</a></li>
    <li><a href="#" onclick="showPage('contact')">Contact</a></li>
  </ul>
  <a href="#" class="nav-cta" onclick="showPage('contact')">Book a Demo</a>
  <button class="hamburger" id="hamburger" onclick="toggleMobile()">
    <span></span><span></span><span></span>
  </button>
</nav>

<!-- REPLACED SCRIPT: defensive, global helpers and guarded DOM access -->
<script>
/* ── CURSOR (decorative only, never blocks clicks) ── */
const cur = document.getElementById('cur'), ring = document.getElementById('curRing');
let mx = 0, my = 0, rx = 0, ry = 0;
const isTouchDevice = () => window.matchMedia('(hover:none)').matches || !window.matchMedia('(pointer:fine)').matches;

if (!isTouchDevice()) {
  document.addEventListener('mousemove', e => {
    mx = e.clientX; my = e.clientY;
    if (cur) { cur.style.left = mx + 'px'; cur.style.top = my + 'px'; }
  });

  (function animRing() {
    rx += (mx - rx) * .12; ry += (my - ry) * .12;
    if (ring) { ring.style.left = rx + 'px'; ring.style.top = ry + 'px'; }
    requestAnimationFrame(animRing);
  })();

  // Only add hover effects if cursor elements exist
  if (cur && ring) {
    document.querySelectorAll('a,button,.feat-card,.svc-card,.gal-item,.faq-q,.val-card').forEach(el => {
      el.addEventListener('mouseenter', () => {
        cur.style.width = '18px'; cur.style.height = '18px';
        ring.style.width = '56px'; ring.style.height = '56px';
        ring.style.borderColor = 'rgba(201,168,76,0.8)';
      });
      el.addEventListener('mouseleave', () => {
        cur.style.width = '10px'; cur.style.height = '10px';
        ring.style.width = '36px'; ring.style.height = '36px';
        ring.style.borderColor = 'rgba(201,168,76,0.5)';
      });
    });
  }
}

/* ── NAV SCROLL ── */
window.addEventListener('scroll', () => {
  const nav = document.getElementById('mainNav');
  if (nav) nav.classList.toggle('scrolled', window.scrollY > 50);
});

/* ── MOBILE MENU ── */
window.toggleMobile = function () {
  const m = document.getElementById('mobileMenu'), h = document.getElementById('hamburger');
  if (m) m.classList.toggle('open');
  if (h) h.classList.toggle('open');
};
window.closeMobile = function () {
  const m = document.getElementById('mobileMenu'), h = document.getElementById('hamburger');
  if (m) m.classList.remove('open');
  if (h) h.classList.remove('open');
};

/* ── PAGE NAV ── */
window.showPage = function (id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const pg = document.getElementById(id);
  if (pg) {
    pg.classList.add('active');
    // Mark all reveals on this page as visible immediately so nothing is hidden
    pg.querySelectorAll('.reveal,.reveal-l,.reveal-r').forEach(el => el.classList.add('visible'));
  }
  window.scrollTo(0, 0);
  setTimeout(() => initReveal(), 100);
  setTimeout(() => initCounters(), 150);
  document.querySelectorAll('.nav-links a').forEach(a => {
    const txt = a.textContent.trim().toLowerCase();
    a.style.color = (txt === id) ? 'var(--gold)' : '';
  });
};

/* ── PARTICLES ── */
(function () {
  const c = document.getElementById('particles');
  if (!c) return;
  for (let i = 0; i < 35; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.cssText = 'left:' + Math.random() * 100 + '%;bottom:-10px;animation-duration:' + (6 + Math.random() * 14) + 's;animation-delay:' + (-Math.random() * 20) + 's;width:' + (1 + Math.random() * 1.5) + 'px;height:' + (1 + Math.random() * 1.5) + 'px;';
    c.appendChild(p);
  }
})();

/* ── REVEAL (IntersectionObserver) ── */
function initReveal() {
  if (!('IntersectionObserver' in window)) {
    // Fallback: make everything visible
    document.querySelectorAll('.reveal,.reveal-l,.reveal-r').forEach(el => el.classList.add('visible'));
    return;
  }
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); } });
  }, { threshold: 0.05, rootMargin: '0px 0px -40px 0px' });
  // Only observe elements inside the active page
  const active = document.querySelector('.page.active');
  if (active) {
    active.querySelectorAll('.reveal,.reveal-l,.reveal-r').forEach(el => {
      if (!el.classList.contains('visible')) obs.observe(el);
    });
  }
}
// Run on initial load - make home page elements visible
document.addEventListener('DOMContentLoaded', () => {
  const home = document.getElementById('home');
  if (home) {
    // Immediately show above-the-fold elements
    home.querySelectorAll('.reveal,.reveal-l,.reveal-r').forEach(el => el.classList.add('visible'));
  }
  initReveal();
  initCounters();
});
// Also run right now in case DOMContentLoaded already fired
(function () {
  const home = document.getElementById('home');
  if (home) home.querySelectorAll('.reveal,.reveal-l,.reveal-r').forEach(el => el.classList.add('visible'));
  initReveal();
})();

/* ── COUNTERS ── */
function animCounter(el, target) {
  if (el._counting) return;
  el._counting = true;
  let c = 0; const step = target / 60;
  const t = setInterval(() => {
    c += step;
    if (c >= target) { c = target; clearInterval(t); }
    el.textContent = Math.round(c) + (el.dataset.count === '99' ? '%' : '+');
  }, 18);
}
function initCounters() {
  document.querySelectorAll('.stat-num[data-count]').forEach(el => {
    el._counting = false;
    animCounter(el, parseInt(el.dataset.count));
  });
}
initCounters();

/* ── TILT on hover (desktop only) ── */
if (!isTouchDevice()) {
  document.querySelectorAll('.tilt').forEach(c => {
    c.addEventListener('mousemove', e => {
      const r = c.getBoundingClientRect();
      const x = (e.clientX - r.left) / r.width - .5;
      const y = (e.clientY - r.top) / r.height - .5;
      c.style.transform = 'perspective(600px) rotateY(' + (x * 8) + 'deg) rotateX(' + (-y * 8) + 'deg) translateZ(8px)';
    });
    c.addEventListener('mouseleave', () => { c.style.transform = ''; });
  });
}

/* ── FAQ accordion ── */
window.toggleFaq = function (el) {
  const item = el.closest('.faq-item');
  const isOpen = item.classList.contains('open');
  document.querySelectorAll('.faq-item').forEach(i => i.classList.remove('open'));
  if (!isOpen) item.classList.add('open');
};

/* ── Gallery filter ── */
window.filterGal = function (btn, cat) {
  document.querySelectorAll('.gal-filter').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
};

/* ── Form submit ── */
window.submitForm = function (btn) {
  if (!btn) return;
  btn.textContent = 'Message Sent ✓';
  btn.style.background = '#2a6a2a';
  setTimeout(() => { btn.textContent = 'Send Message'; btn.style.background = ''; }, 3000);
};
</script>
